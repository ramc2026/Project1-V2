<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero-header">
    <div class="hero-content">
      <a class="home-button" href="gallery.html">Back to Gallery</a>
      <h1>Artwork Gallery</h1>
      <p>A dedicated page for displaying and posting my artworks.</p>
    </div>
  </header>

  <main>
    <section class="art-page-grid">
      <article class="artwork-card">
        <div class="gallery-image artwork-image art-original">
          <img src="images/gateway_to_paradise.png" alt="Gateway to Paradise" class="artwork-photo-original">
        </div>
      </article>
      <article class="artwork-card">
        <div class="gallery-image artwork-image art-original">
          <img src="images/dnd.png" alt="DND artwork" class="artwork-photo-original">
        </div>
      </article>
      <article class="artwork-card">
        <div class="gallery-image artwork-image art-original">
          <img src="images/parrot.png" alt="Parrot" class="artwork-photo-original">
        </div>
      </article>
      <article class="artwork-card artwork-card-large">
        <div class="gallery-image artwork-image art-original">
          <img src="images/bayou.jpg" alt="Bayou" class="artwork-photo-original">
        </div>
      </article>
      <article class="artwork-card">
        <div class="gallery-image artwork-image art-original">
          <img src="images/uncle_sam.png" alt="Uncle Sam" class="artwork-photo-original">
        </div>
      </article>
      <article class="artwork-card artwork-card-large">
        <div class="gallery-image artwork-image art-original">
          <img src="images/beachside.png" alt="Beachside" class="artwork-photo-original">
        </div>
      </article>
    </section>
  </main>

  <footer class="bottom-footer">
    <div>
      <h2>Return Navigation</h2>
      <p><a class="text-link" href="gallery.html">Back to gallery page</a></p>
    </div>
  </footer>
</body>
</html>
